<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&amp;display=swap');
    .sans { font-family: 'DM Sans', system-ui, sans-serif; }
  </style>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/><stop offset="0.55" stop-color="#673DE6"/><stop offset="1" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#673DE6"/><stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED"/><stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA" stop-opacity="0.12"/><stop offset="1" stop-color="#6366F1" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="haze" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.16"/><stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heroHaze" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7B66FF" stop-opacity="0.20"/><stop offset="1" stop-color="#7B66FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#7B66FF" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <!-- canvas -->
  <rect width="1200" height="630" fill="#121212"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="1010" cy="70" rx="430" ry="320" fill="url(#heroHaze)"/>

  <!-- navbar lockup -->
  <g>
    <rect x="64" y="50" width="54" height="54" rx="15" fill="url(#tile)"/>
    <g transform="translate(74.5 60.5) scale(1.4)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3.5" width="18" height="7.5" rx="2.2"/><rect x="3" y="13" width="18" height="7.5" rx="2.2"/>
      <g fill="#fff" stroke="none"><circle cx="6.9" cy="6" r="1"/><circle cx="6.9" cy="8.4" r="1"/><circle cx="6.9" cy="15.5" r="1"/><circle cx="6.9" cy="17.9" r="1"/></g>
    </g>
    <text x="132" y="88" class="sans" font-size="30" font-weight="800" fill="#fff" letter-spacing="-0.5">CekVPS</text>
  </g>

  <!-- right: network art (static) -->
  <g transform="translate(687.8 116) scale(1.18)">
    <circle cx="210" cy="190" r="150" fill="url(#haze)"/>
    <circle cx="210" cy="190" r="88" fill="none" stroke="#A78BFA" stroke-opacity="0.28" stroke-width="1" stroke-dasharray="2 8"/>
    <circle cx="210" cy="190" r="142" fill="none" stroke="#A78BFA" stroke-opacity="0.28" stroke-width="1" stroke-dasharray="3 11"/>
    <!-- connecting lines -->
    <g stroke="url(#lineGrad)" stroke-width="2" stroke-dasharray="3 9" stroke-linecap="round">
      <line x1="210" y1="190" x2="210" y2="48"/><line x1="210" y1="190" x2="333" y2="119"/>
      <line x1="210" y1="190" x2="333" y2="261"/><line x1="210" y1="190" x2="210" y2="332"/>
      <line x1="210" y1="190" x2="87" y2="261"/><line x1="210" y1="190" x2="87" y2="119"/>
    </g>
    <!-- satellite nodes: glow + disc + glyph -->
    <g>
      <circle cx="210" cy="48"  r="22" fill="#8B5CF6" opacity="0.16" filter="url(#soft)"/><circle cx="210" cy="48"  r="13" fill="#8B5CF6"/>
      <g stroke="#fff" stroke-width="1.4" fill="none"><circle cx="210" cy="48" r="4.6"/><line x1="205.4" y1="48" x2="214.6" y2="48"/><path d="M210 43.4 Q213 48 210 52.6 Q207 48 210 43.4"/></g>
      <circle cx="333" cy="119" r="19" fill="#06B6D4" opacity="0.16" filter="url(#soft)"/><circle cx="333" cy="119" r="10" fill="#06B6D4"/>
      <g stroke="#fff" stroke-width="1.4" fill="none"><rect x="328.5" y="114.5" width="9" height="4" rx="1"/><rect x="328.5" y="119.5" width="9" height="4" rx="1"/></g>
      <circle cx="333" cy="261" r="22" fill="#10B981" opacity="0.16" filter="url(#soft)"/><circle cx="333" cy="261" r="13" fill="#10B981"/>
      <g stroke="#fff" stroke-width="1.4" fill="none"><path d="M328.5 261 L333 257 L337.5 261 L333 265 Z"/></g>
      <circle cx="210" cy="332" r="19" fill="#6366F1" opacity="0.16" filter="url(#soft)"/><circle cx="210" cy="332" r="10" fill="#6366F1"/>
      <g stroke="#fff" stroke-width="1.4" fill="none"><circle cx="210" cy="332" r="4.6"/><line x1="205.4" y1="332" x2="214.6" y2="332"/><path d="M210 327.4 Q213 332 210 336.6 Q207 332 210 327.4"/></g>
      <circle cx="87" cy="261" r="22" fill="#0EA5E9" opacity="0.16" filter="url(#soft)"/><circle cx="87" cy="261" r="13" fill="#0EA5E9"/>
      <g stroke="#fff" stroke-width="1.4" fill="none"><rect x="82.5" y="256.5" width="9" height="4" rx="1"/><rect x="82.5" y="261.5" width="9" height="4" rx="1"/></g>
      <circle cx="87" cy="119" r="19" fill="#A855F7" opacity="0.16" filter="url(#soft)"/><circle cx="87" cy="119" r="10" fill="#A855F7"/>
      <g stroke="#fff" stroke-width="1.4" fill="none"><path d="M82.5 119 L87 115 L91.5 119 L87 123 Z"/></g>
    </g>
    <!-- hub -->
    <circle cx="210" cy="190" r="54" fill="url(#hubGrad)" opacity="0.18" filter="url(#soft)"/>
    <circle cx="210" cy="190" r="42" fill="url(#hubGrad)"/>
    <circle cx="210" cy="190" r="42" fill="none" stroke="#fff" stroke-opacity="0.25" stroke-width="1"/>
    <g stroke="#fff" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.96">
      <rect x="192" y="173" width="36" height="14" rx="3.5"/><rect x="192" y="193" width="36" height="14" rx="3.5"/>
    </g>
    <g fill="#C4B5FD"><circle cx="199" cy="180" r="1.8"/><circle cx="199" cy="200" r="1.8"/></g>
  </g>

  <!-- left: copy -->
  <!-- badge pill -->
  <g>
    <rect x="64" y="196" width="232" height="38" rx="19" fill="#1A1A1A" fill-opacity="0.6" stroke="#fff" stroke-opacity="0.10"/>
    <circle cx="86" cy="215" r="4" fill="#10B981"/>
    <text x="100" y="221" class="sans" font-size="15" font-weight="500" fill="#B7B7BD">8 provider · 45 plan · gratis</text>
  </g>

  <text x="62" y="316" class="sans" font-size="58" font-weight="800" fill="#fff" letter-spacing="-1.5">Cari VPS termurah,</text>
  <text x="62" y="382" class="sans" font-size="58" font-weight="800" fill="url(#head)" letter-spacing="-1.5">tanpa buka banyak tab.</text>

  <text x="64" y="436" class="sans" font-size="23" font-weight="400" fill="#B7B7BD">Bandingkan harga VPS lokal &amp; global dalam satu daftar.</text>
  <text x="64" y="468" class="sans" font-size="23" font-weight="400" fill="#B7B7BD">Sortir, cari, deploy.</text>

  <!-- url chip -->
  <text x="64" y="566" class="sans" font-size="20" font-weight="700" fill="#7B66FF">cekvps.com</text>
</svg>
